name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - run: npm ci
      - run: npm run check
      - run: npm test
      - run: npm run build

      - name: Read version from package.json
        id: version
        run: echo "value=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Check if tag already exists
        id: tag
        run: |
          if git rev-parse "v${{ steps.version.outputs.value }}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Extract changelog for this version
        if: steps.tag.outputs.exists == 'false'
        run: |
          awk '/^## \[${{ steps.version.outputs.value }}\]/{flag=1;next} /^## \[/{flag=0} flag' \
            CHANGELOG.md > .release-notes.md
          test -s .release-notes.md || (echo "CHANGELOG entry for ${{ steps.version.outputs.value }} not found" && exit 1)

      - name: Publish to VS Code Marketplace
        if: steps.tag.outputs.exists == 'false'
        run: npx @vscode/vsce publish --pat "${{ secrets.VSCE_PAT }}"

      - name: Create git tag
        if: steps.tag.outputs.exists == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "v${{ steps.version.outputs.value }}"
          git push origin "v${{ steps.version.outputs.value }}"

      - name: Create GitHub Release
        if: steps.tag.outputs.exists == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.value }}
          name: v${{ steps.version.outputs.value }}
          body_path: .release-notes.md
